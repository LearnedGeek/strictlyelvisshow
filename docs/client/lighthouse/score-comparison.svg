<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="Inter, Arial, sans-serif">
  <rect width="600" height="420" fill="#121110" rx="12"/>

  <text x="300" y="35" text-anchor="middle" fill="#C9A84C" font-size="16" font-weight="600">Lighthouse Score Comparison</text>
  <text x="300" y="55" text-anchor="middle" fill="#9E9689" font-size="11">GoDaddy Mobile vs Netlify Custom Site (Mobile)</text>

  <!-- Legend -->
  <rect x="170" y="70" width="12" height="12" fill="#7a7570" rx="2"/>
  <text x="188" y="81" fill="#9E9689" font-size="11">GoDaddy</text>
  <rect x="270" y="70" width="12" height="12" fill="#C9A84C" rx="2"/>
  <text x="288" y="81" fill="#9E9689" font-size="11">Netlify (Final)</text>

  <!-- Y-axis: 80 at bottom (y=330), 100 at top (y=110), each point = 11px -->

  <!-- Grid lines -->
  <line x1="80" y1="110" x2="560" y2="110" stroke="#2a2520" stroke-width="0.5"/>
  <line x1="80" y1="165" x2="560" y2="165" stroke="#2a2520" stroke-width="0.5"/>
  <line x1="80" y1="220" x2="560" y2="220" stroke="#2a2520" stroke-width="0.5"/>
  <line x1="80" y1="275" x2="560" y2="275" stroke="#2a2520" stroke-width="0.5"/>
  <line x1="80" y1="330" x2="560" y2="330" stroke="#2a2520" stroke-width="0.5"/>

  <!-- Y-axis labels -->
  <text x="70" y="114" text-anchor="end" fill="#9E9689" font-size="10">100</text>
  <text x="70" y="169" text-anchor="end" fill="#9E9689" font-size="10">95</text>
  <text x="70" y="224" text-anchor="end" fill="#9E9689" font-size="10">90</text>
  <text x="70" y="279" text-anchor="end" fill="#9E9689" font-size="10">85</text>
  <text x="70" y="334" text-anchor="end" fill="#9E9689" font-size="10">80</text>

  <!-- Scale: 100=y110, 80=y330, each point = 11px -->
  <!-- GoDaddy: Perf=82 (y308), Access=90 (y220), BP=96 (y154), SEO=92 (y198) -->
  <!-- Netlify: All 100 (y110) -->

  <!-- Performance -->
  <rect x="128" y="308" width="35" height="22" fill="#7a7570" rx="3"/>
  <text x="145" y="300" text-anchor="middle" fill="#9E9689" font-size="10" font-weight="600">82</text>
  <rect x="168" y="110" width="35" height="220" fill="#C9A84C" rx="3"/>
  <text x="185" y="102" text-anchor="middle" fill="#C9A84C" font-size="10" font-weight="600">100</text>
  <text x="165" y="360" text-anchor="middle" fill="#ECE5D8" font-size="11" font-weight="500">Performance</text>

  <!-- Accessibility -->
  <rect x="248" y="220" width="35" height="110" fill="#7a7570" rx="3"/>
  <text x="265" y="212" text-anchor="middle" fill="#9E9689" font-size="10" font-weight="600">90</text>
  <rect x="288" y="110" width="35" height="220" fill="#C9A84C" rx="3"/>
  <text x="305" y="102" text-anchor="middle" fill="#C9A84C" font-size="10" font-weight="600">100</text>
  <text x="285" y="360" text-anchor="middle" fill="#ECE5D8" font-size="11" font-weight="500">Accessibility</text>

  <!-- Best Practices -->
  <rect x="368" y="154" width="35" height="176" fill="#7a7570" rx="3"/>
  <text x="385" y="146" text-anchor="middle" fill="#9E9689" font-size="10" font-weight="600">96</text>
  <rect x="408" y="110" width="35" height="220" fill="#C9A84C" rx="3"/>
  <text x="425" y="102" text-anchor="middle" fill="#C9A84C" font-size="10" font-weight="600">100</text>
  <text x="405" y="360" text-anchor="middle" fill="#ECE5D8" font-size="11" font-weight="500">Best Practices</text>

  <!-- SEO -->
  <rect x="478" y="198" width="35" height="132" fill="#7a7570" rx="3"/>
  <text x="495" y="190" text-anchor="middle" fill="#9E9689" font-size="10" font-weight="600">92</text>
  <rect x="518" y="110" width="35" height="220" fill="#C9A84C" rx="3"/>
  <text x="535" y="102" text-anchor="middle" fill="#C9A84C" font-size="10" font-weight="600">100</text>
  <text x="515" y="360" text-anchor="middle" fill="#ECE5D8" font-size="11" font-weight="500">SEO</text>

  <!-- Bottom note -->
  <text x="300" y="395" text-anchor="middle" fill="#6b6058" font-size="9">Lighthouse Mobile Audit - March 2026 | thestrictlyelvisshow.com</text>
</svg>